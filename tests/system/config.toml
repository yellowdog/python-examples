[common]  #####################################################################

    importCommon = "../../config_{{CONFIG:=test}}.toml"

    namespace = "pytest-system"
    tag = "pytest-system-{{username}}"

[common.variables]  ###########################################################

    worker_tag = "{{tag}}-worker"
    timeout = 3.0

[workerPool]  ##################################################################

    templateId = "{{template_id:=yd-demo/yd-demo-aws-eu-west-2-split-ondemand}}"
    imagesId = "{{images_id:=yd-demo/ubuntu-22-04}}"
    userDataFiles = ["install-agent.sh"]

    workerTag = "{{worker_tag}}"
    workersPerNode = "{{num:workers_per_node:=5}}"

    minNodes = "{{num:min_nodes:=0}}"
    targetInstanceCount = "{{num:instances:=1}}"
    maxNodes = "{{num:max_nodes:=2}}"

    idleNodeTimeout = "{{num:node_timeout:={{timeout}}}}"
    idlePoolTimeout = "{{num:pool_timeout:={{timeout}}}}"

[workRequirement]  #############################################################

    taskType = "bash"
    workerTags = ["{{worker_tag}}"]

[dataClient]  ##################################################################

    remote = "rclone:S3,type=s3,provider=AWS,env_auth=true,region=eu-west-2,location_constraint=eu-west-2"
    bucket = "tech.yellowdog.devsandbox.dev-platform"
    prefix = "yd-cli-test"

################################################################################
